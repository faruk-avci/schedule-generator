<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Generator</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="icon" type="image/x-icon" href="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <div id="toastContainer"></div>

    <div class="actualProgram">
        <div class="searchAndDisplayArea">
            <div class="searchArea">
                <form id="searchForm">
                    
                    <div class="text-input">
                    <input name="courseName" type="text" id="searchInput" placeholder="Ders Ara: BUS101">
                </div>
                    <div class="form-buttons">
                    <button type="button" onclick="searchLessons()">Ara</button>
                    <button type="button" onclick="clearResults()">Temizle</button>
                    </div>
                    <button class="generate" id="generate" type="button" onclick="generateSchedules()">Oluştur</button>
                </form>
            </div>
        </div>
    <div class="resultAndAddeds">
            <div id="results">
    
            </div>
            <div id="addedCourses">
                <div id="courses">
                    <h3>Added Courses</h3>
                </div>
                <div id="sections">
                    <h3>Added Sections</h3>
                </div>
            </div>
        </div>

    </div>

   
    <script src="js/main.js"></script>
</body>

</html>
